<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WebAR – 2D SDキャラ</title>
  <script src="https://cdn.jsdelivr.net/npm/aframe@1.5.0/dist/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    #hint {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.6);
      color: #fff;
      font-family: sans-serif;
      font-size: 1rem;
      padding: 10px 24px;
      border-radius: 999px;
      pointer-events: none;
      opacity: 1;
      transition: opacity 0.4s ease;
      z-index: 9999;
      white-space: nowrap;
    }
    #hint.found {
      background: rgba(0, 160, 80, 0.8);
    }
  </style>
</head>
<body>

  <!-- 状態表示ラベル（常時表示） -->
  <div id="hint">📷 マーカーを探しています…</div>

  <!--
    uiLoading / uiError / uiScanning はすべて "no" にして
    MindAR 標準UIに任せず、JavaScript で制御する
  -->
  <a-scene
    mindar-image="
      imageTargetSrc: ./targets.mind;
      autoStart: true;
      uiLoading: no;
      uiError: no;
      uiScanning: no;
    "
    color-space="sRGB"
    renderer="colorManagement: true"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
  >
    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity mindar-image-target="targetIndex: 0">

      <!-- SDキャラ画像 -->
      <a-image
        src="./chara.png"
        width="0.7"
        height="0.7"
        position="0 0.05 0"
        transparent="true"
        alpha-test="0.1"
        animation__float="
          property: position;
          from: 0 0.02 0;
          to:   0 0.10 0;
          dur: 1400;
          dir: alternate;
          loop: true;
          easing: easeInOutSine;
        "
        animation__wobble="
          property: rotation;
          from: 0 0 -4;
          to:   0 0  4;
          dur: 2200;
          dir: alternate;
          loop: true;
          easing: easeInOutQuad;
        "
      ></a-image>

      <!-- キャラの影 -->
      <a-ellipse
        position="0 -0.28 0"
        semi-minor-axis="0.18"
        semi-major-axis="0.30"
        color="#000000"
        opacity="0.25"
        rotation="-90 0 0"
        animation__shadow="
          property: scale;
          from: 1 1 1;
          to:   0.88 0.88 0.88;
          dur: 1400;
          dir: alternate;
          loop: true;
          easing: easeInOutSine;
        "
      ></a-ellipse>

    </a-entity>

  </a-scene>

  <script>
    const hint = document.getElementById('hint');
    const scene = document.querySelector('a-scene');

    scene.addEventListener('targetFound', () => {
      hint.textContent = '🎉 キャラクター出現中！';
      hint.classList.add('found');
    });

    scene.addEventListener('targetLost', () => {
      hint.textContent = '📷 マーカーを探しています…';
      hint.classList.remove('found');
    });
  </script>

</body>
</html>
