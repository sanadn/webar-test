<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>カメラテスト</title>
  <style>
    body { margin:0; background:#000; display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; gap:16px; font-family:sans-serif; }
    video { width:100%; max-width:400px; border-radius:12px; }
    button { padding:16px 40px; font-size:1.1rem; background:#2563eb; color:#fff; border:none; border-radius:999px; cursor:pointer; }
    #msg { color:#fff; font-size:1rem; text-align:center; padding:0 24px; }
  </style>
</head>
<body>
  <p id="msg">ボタンを押してカメラをテストします</p>
  <button id="btn">カメラを起動</button>
  <video id="video" autoplay playsinline muted></video>

  <script>
    document.getElementById('btn').addEventListener('click', async () => {
      const msg = document.getElementById('msg');
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
        document.getElementById('video').srcObject = stream;
        msg.textContent = '✅ カメラ起動成功！映像が見えていれば問題なし';
        msg.style.color = '#4ade80';
      } catch(e) {
        msg.textContent = '❌ エラー: ' + e.message;
        msg.style.color = '#f87171';
      }
    });
  </script>
</body>
</html>
