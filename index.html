<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WebAR – 2D SDキャラ</title>

  <!-- A-Frame 1.4.2 + MindAR 1.2.5 -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #000;
      font-family: sans-serif;
    }

    /* ── スタート画面 ── */
    #start-screen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #111;
      color: #fff;
      z-index: 9999;
      gap: 20px;
    }
    #start-screen h1 {
      font-size: 1.4rem;
      text-align: center;
      line-height: 1.6;
    }
    #start-screen p {
      font-size: 0.9rem;
      color: #aaa;
      text-align: center;
      padding: 0 32px;
    }
    #start-btn {
      margin-top: 8px;
      padding: 16px 40px;
      font-size: 1.1rem;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 999px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    #start-btn:active { background: #1d4ed8; }

    /* ── 状態ラベル ── */
    #hint {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.6);
      color: #fff;
      font-size: 1rem;
      padding: 10px 24px;
      border-radius: 999px;
      pointer-events: none;
      z-index: 9998;
      white-space: nowrap;
      display: none;
    }
    #hint.found { background: rgba(0,160,80,0.85); }
  </style>
</head>
<body>

  <!-- スタート画面 -->
  <div id="start-screen">
    <h1>🎯 WebAR<br>SDキャラ体験</h1>
    <p>ボタンを押してカメラを起動し、<br>マーカー画像にかざしてください。</p>
    <button id="start-btn">タップしてARを開始</button>
  </div>

  <!-- 状態ラベル -->
  <div id="hint">📷 マーカーを探しています…</div>

  <!-- AR シーン（autoStart: false で最初は止めておく） -->
  <a-scene
    id="ar-scene"
    mindar-image="
      imageTargetSrc: ./targets.mind;
      autoStart: false;
      uiLoading: no;
      uiError: no;
      uiScanning: no;
    "
    color-space="sRGB"
    renderer="colorManagement: true"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
  >
    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity mindar-image-target="targetIndex: 0">

      <!-- SDキャラ -->
      <a-image
        src="./chara.png"
        width="0.7"
        height="0.7"
        position="0 0.05 0"
        transparent="true"
        alpha-test="0.1"
        animation__float="
          property: position;
          from: 0 0.02 0;
          to:   0 0.10 0;
          dur: 1400; dir: alternate; loop: true; easing: easeInOutSine;
        "
        animation__wobble="
          property: rotation;
          from: 0 0 -4;
          to:   0 0  4;
          dur: 2200; dir: alternate; loop: true; easing: easeInOutQuad;
        "
      ></a-image>

      <!-- 影 -->
      <a-ellipse
        position="0 -0.28 0"
        semi-minor-axis="0.18"
        semi-major-axis="0.30"
        color="#000" opacity="0.25"
        rotation="-90 0 0"
        animation__shadow="
          property: scale;
          from: 1 1 1; to: 0.88 0.88 0.88;
          dur: 1400; dir: alternate; loop: true; easing: easeInOutSine;
        "
      ></a-ellipse>

    </a-entity>
  </a-scene>

  <script>
    const startScreen = document.getElementById('start-screen');
    const startBtn    = document.getElementById('start-btn');
    const hint        = document.getElementById('hint');
    const scene       = document.getElementById('ar-scene');

    // ── ボタンを押したらAR開始 ──────────────────────────────
    startBtn.addEventListener('click', () => {
      startScreen.style.display = 'none';
      hint.style.display = 'block';

      // A-Frame の初期化完了を待ってから MindAR をスタート
      if (scene.hasLoaded) {
        scene.components['mindar-image'].startAR();
      } else {
        scene.addEventListener('loaded', () => {
          scene.components['mindar-image'].startAR();
        });
      }
    });

    // ── マーカー検出・消失 ────────────────────────────────
    scene.addEventListener('targetFound', () => {
      hint.textContent = '🎉 キャラクター出現中！';
      hint.classList.add('found');
    });
    scene.addEventListener('targetLost', () => {
      hint.textContent = '📷 マーカーを探しています…';
      hint.classList.remove('found');
    });
  </script>

</body>
</html>
