<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WebAR – 2D SDキャラ</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; font-family: sans-serif; }
    #container { width: 100vw; height: 100vh; position: relative; }
    #start-screen {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #111; color: #fff; z-index: 9999; gap: 20px;
    }
    #start-screen h1 { font-size: 1.4rem; text-align: center; line-height: 1.6; }
    #start-screen p { font-size: 0.9rem; color: #aaa; text-align: center; padding: 0 32px; }
    #start-btn {
      padding: 16px 40px; font-size: 1.1rem;
      background: #2563eb; color: #fff;
      border: none; border-radius: 999px; cursor: pointer;
    }
    #hint {
      position: fixed; bottom: 32px; left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.6); color: #fff;
      font-size: 1rem; padding: 10px 24px;
      border-radius: 999px; pointer-events: none;
      z-index: 9998; white-space: nowrap; display: none;
    }
    #hint.found { background: rgba(0,160,80,0.85); }
  </style>
</head>
<body>
  <div id="start-screen">
    <h1>🎯 WebAR<br>SDキャラ体験</h1>
    <p>ボタンを押してカメラを起動し、<br>マーカー画像にかざしてください。</p>
    <button id="start-btn">タップしてARを開始</button>
  </div>
  <div id="hint">📷 マーカーを探しています…</div>
  <div id="container"></div>

  <script type="module">
    import { MindARThree } from 'https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-three.prod.js';
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.154.0/build/three.module.js';

    const startBtn    = document.getElementById('start-btn');
    const startScreen = document.getElementById('start-screen');
    const hint        = document.getElementById('hint');
    const container   = document.getElementById('container');

    startBtn.addEventListener('click', async () => {
      startScreen.style.display = 'none';
      hint.style.display = 'block';
      hint.textContent = '⏳ カメラ起動中…';

      // ① カメラ権限を先に取得（これはカメラテストと同じ方法）
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
        stream.getTracks().forEach(t => t.stop());
      } catch(e) {
        hint.textContent = '❌ カメラエラー: ' + e.message;
        return;
      }

      // ② MindAR（A-Frameなし）を起動
      const mindarThree = new MindARThree({
        container,
        imageTargetSrc: './targets.mind',
      });

      const { renderer, scene, camera } = mindarThree;

      // ③ キャラ画像を板に貼る
      const loader = new THREE.TextureLoader();
      const texture = await new Promise(resolve => loader.load('./chara.png', resolve));
      const geometry = new THREE.PlaneGeometry(1, 1);
      const material = new THREE.MeshBasicMaterial({ map: texture, transparent: true, side: THREE.DoubleSide });
      const plane = new THREE.Mesh(geometry, material);

      const anchor = mindarThree.addAnchor(0);
      anchor.group.add(plane);

      // ④ マーカー検出イベント
      anchor.onTargetFound = () => {
        hint.textContent = '🎉 キャラクター出現中！';
        hint.classList.add('found');
      };
      anchor.onTargetLost = () => {
        hint.textContent = '📷 マーカーを探しています…';
        hint.classList.remove('found');
      };

      // ⑤ AR開始
      await mindarThree.start();
      hint.textContent = '📷 マーカーを探しています…';

      // ⑥ フワフワアニメーション
      const clock = new THREE.Clock();
      renderer.setAnimationLoop(() => {
        const t = clock.getElapsedTime();
        plane.position.y = Math.sin(t * 2.0) * 0.06;
        plane.rotation.z = Math.sin(t * 1.4) * 0.07;
        renderer.render(scene, camera);
      });
    });
  </script>
</body>
</html>
